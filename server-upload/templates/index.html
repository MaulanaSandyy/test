<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Code Loader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            background: rgba(30, 30, 50, 0.9);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(100, 255, 218, 0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #00ff9a;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0, 255, 154, 0.5);
        }
        .logo p {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(100, 255, 218, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #00ff9a;
            box-shadow: 0 0 20px rgba(0, 255, 154, 0.2);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ff9a 0%, #00cc7a 100%);
            border: none;
            border-radius: 10px;
            color: #0f0f23;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 154, 0.4);
        }
        button:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .status.success {
            background: rgba(0, 255, 154, 0.2);
            border: 1px solid #00ff9a;
            color: #00ff9a;
        }
        .status.error {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid #ff6464;
            color: #ff6464;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 154, 0.3);
            border-top-color: #00ff9a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(100, 200, 255, 0.1);
            border-radius: 10px;
            font-size: 12px;
            color: #888;
        }
        .info strong { color: #64c8ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Secure Loader</h1>
            <p>Encrypted Code Distribution System v1.0</p>
        </div>

        <div class="form-group">
            <label>Server URL</label>
            <input type="text" id="serverUrl" value="http://192.168.1.3:5000">
        </div>

        <div class="form-group">
            <label>License Key</label>
            <input type="text" id="licenseKey" placeholder="Enter your license key...">
        </div>

        <button id="activateBtn" onclick="activate()">Activate</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #888;">Connecting...</p>
        </div>

        <div class="status" id="status"></div>

        <div class="info">
            <strong>How to use:</strong><br>
            1. Enter your license key<br>
            2. Click Activate<br>
            3. Download the client loader<br>
            4. Run with: python loader.py
        </div>
    </div>

    <script>
        let token = null;

        async function activate() {
            const serverUrl = document.getElementById('serverUrl').value.trim();
            const licenseKey = document.getElementById('licenseKey').value.trim();
            const btn = document.getElementById('activateBtn');
            const status = document.getElementById('status');
            const loading = document.getElementById('loading');

            if (!licenseKey) {
                showStatus('Please enter a license key', 'error');
                return;
            }

            btn.style.display = 'none';
            loading.style.display = 'block';
            status.style.display = 'none';

            try {
                const hwid = await getHWID();
                
                const response = await fetch(`${serverUrl}/api/v1/auth/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        license_key: licenseKey,
                        hwid: hwid
                    })
                });

                const data = await response.json();

                if (data.success) {
                    token = data.token;
                    showStatus(`License activated! Token: ${token.substring(0, 30)}...`, 'success');
                } else {
                    showStatus(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus(`Connection failed: ${error.message}`, 'error');
            } finally {
                btn.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }

        async function getHWID() {
            const info = navigator.userAgent + navigator.platform + screen.width + screen.height;
            const encoder = new TextEncoder();
            const data = encoder.encode(info);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 32);
        }
    </script>
</body>
</html>
